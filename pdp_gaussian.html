<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>PDP</title>
  <style>
    @font-face {
      font-family: 'FranklinGothic';
      src: url('./ITCFranklinGothicStd-DmCp.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0f0f0f;
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      overflow: hidden;
    }

    #viewer-wrap {
      position: fixed;
      top: 0; left: 0; right: 0;
      bottom: 200px;
    }

    #viewer-wrap spline-viewer {
      width: 100%;
      height: 100%;
      display: block;
    }

    #slider-indicator {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      align-items: center;
      z-index: 10;
      pointer-events: none;
    }
    .slide-dot {
      height: 3px;
      border-radius: 2px;
      background: #111;
      transition: width 0.3s;
    }
    .slide-dot.active { width: 28px; }
    .slide-dot:not(.active) { width: 8px; opacity: 0.3; }

    #bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 200px;
      background: #fff;
      border-radius: 16px 16px 0 0;
      display: flex;
      flex-direction: column;
      padding: 0 20px 28px;
      z-index: 10;
    }

    #handle {
      width: 36px; height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin: 10px auto 14px;
      flex-shrink: 0;
    }

    #chips {
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      margin-bottom: 18px;
    }
    #chips::-webkit-scrollbar { display: none; }

    .filter-btn {
      flex-shrink: 0;
      border: none; background: none;
      padding: 4px; cursor: pointer;
      display: flex; align-items: center;
    }

    .chip {
      display: inline-block;
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.02em;
      border: 1.5px solid #111;
      transition: background 0.15s, color 0.15s;
    }
    .chip.active { background: #111; color: #fff; }
    .chip:not(.active) { background: #fff; color: #111; }

    #product { flex: 1; }

    #product-name {
      font-family: 'FranklinGothic', 'Helvetica Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: #111;
      line-height: 1.1;
      margin-bottom: 5px;
    }
    #product-sub { font-size: 12px; color: #888; margin-bottom: 4px; }
    #product-price { font-size: 13px; font-weight: 600; color: #111; }
  </style>
</head>
<body>

  <div id="viewer-wrap">
    <script type="module" src="https://unpkg.com/@splinetool/viewer@1.12.98/build/spline-viewer.js"></script>
    <spline-viewer url="https://prod.spline.design/xHKVCxbX1Cfv1Suu/scene.splinecode"></spline-viewer>
    <div id="slider-indicator">
      <div class="slide-dot active"></div>
      <div class="slide-dot"></div>
      <div class="slide-dot"></div>
    </div>
  </div>

  <div id="bottom">
    <div id="handle"></div>
    <div id="chips">
      <button class="filter-btn" aria-label="Filtres">
        <svg width="18" height="14" viewBox="0 0 18 14" fill="none">
          <rect y="0"  width="18" height="2" rx="1" fill="#111"/>
          <rect y="6"  width="18" height="2" rx="1" fill="#111"/>
          <rect y="12" width="18" height="2" rx="1" fill="#111"/>
          <rect x="10" y="-1" width="4" height="4" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
          <rect x="4"  y="5"  width="4" height="4" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
          <rect x="10" y="11" width="4" height="4" rx="2" fill="#fff" stroke="#111" stroke-width="1.5"/>
        </svg>
      </button>
      <div class="chip active">Sporty Chic</div>
      <div class="chip">Casual streetwear</div>
      <div class="chip">Basic effortless</div>
      <div class="chip">Evening</div>
    </div>
    <div id="product">
      <div id="product-name">Balloon Long Skirt</div>
      <div id="product-sub">Originals</div>
      <div id="product-price">120 €</div>
    </div>
  </div>

  <script>
    document.querySelectorAll('.chip').forEach(c => {
      c.addEventListener('click', () => {
        document.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
        c.classList.add('active');
      });
    });
  </script>

</body>
</html>
