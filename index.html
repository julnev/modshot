<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no"/>
  <title>Avatar 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0f0f0f; overflow: hidden; }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0f0f0f; color: #fff;
      font-family: -apple-system, sans-serif; font-size: 14px; gap: 16px;
      z-index: 10;
    }
    #bar-wrap { width: 200px; height: 4px; background: #333; border-radius: 2px; }
    #bar { height: 100%; width: 0%; background: #fff; border-radius: 2px; transition: width 0.1s; }
    #hint {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.4); font-family: -apple-system, sans-serif;
      font-size: 12px; pointer-events: none; white-space: nowrap;
    }
  </style>
</head>
<body>
  <div id="loading">
    <span>Chargement du modèle 3D…</span>
    <div id="bar-wrap"><div id="bar"></div></div>
    <span id="pct">0%</span>
  </div>
  <div id="hint">Glisser pour tourner · Pincer pour zoomer</div>

  <script type="module">
    import * as GaussianSplats3D from 'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.js';

    const viewer = new GaussianSplats3D.Viewer({
      rootElement: document.body,
      sharedMemoryForWorkers: false,
      selfDrivenMode: true,
      useBuiltInControls: true,
      camera: undefined,
    });

    viewer.addSplatScene('./sharp_1783424100968.ply', {
      splatAlphaRemovalThreshold: 5,
      showLoadingUI: false,
      onProgress: (pct) => {
        document.getElementById('bar').style.width = pct + '%';
        document.getElementById('pct').textContent = Math.round(pct) + '%';
      },
    })
    .then(() => {
      document.getElementById('loading').style.display = 'none';
      viewer.start();
    })
    .catch(e => {
      document.getElementById('loading').innerHTML = `<span style="color:#e34948">Erreur : ${e.message}</span>`;
    });
  </script>
</body>
</html>
